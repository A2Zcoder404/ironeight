<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Reactor Interface</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="screen-glow" id="screen-glow"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div class="hud-wrapper">
        <header class="hud-header">
            <div class="header-left">
                <div class="sys-id">STARK-IND // ARC-VII</div>
            </div>
            <div class="header-center">
                <h1 class="main-title">ENERGY DISTRIBUTION PANEL</h1>
            </div>
            <div class="header-right">
                <div class="status-box">
                    <span class="status-label">SYS STATUS:</span>
                    <span id="global-status" class="status-text optimal">OPTIMAL</span>
                </div>
            </div>
        </header>

        <main class="dashboard">
            <!-- Left Panel -->
            <aside class="panel side-panel left-panel">
                <div class="panel-header">REACTOR DIAGNOSTICS</div>
                <div class="diagnostic-item">
                    <span class="diag-label">CORE TEMP</span>
                    <span class="diag-val" id="val-temp">3,250 °K</span>
                </div>
                <div class="diagnostic-item">
                    <span class="diag-label">PALLADIUM LVL</span>
                    <span class="diag-val">98.2 %</span>
                </div>
                <div class="diagnostic-item">
                    <span class="diag-label">MAG-FIELD</span>
                    <span class="diag-val" id="val-mag">STABLE</span>
                </div>

                <div class="alert-box" id="alert-box">
                    ALL SYSTEMS NOMINAL. AWAITING INPUT.
                </div>
            </aside>

            <!-- Center Panel (Reactor) -->
            <section class="panel center-panel">
                <div class="arc-reactor" id="arc-reactor">
                    <div class="ring ring-1"></div>
                    <div class="ring ring-2"></div>
                    <div class="ring ring-3"></div>
                    <div class="ring ring-4"></div>
                    <div class="core">
                        <div class="core-content">
                            <div class="core-label">REMAINING</div>
                            <div class="core-value" id="energy-remaining">100</div>
                            <div class="core-unit">TWh</div>
                        </div>
                    </div>
                </div>
                <div class="total-energy-display">
                    TOTAL CAPACITY: <span class="glow-text">100 TWh</span>
                </div>
            </section>

            <!-- Right Panel (Subsystems) -->
            <aside class="panel side-panel right-panel" id="subsystems-container">
                <div class="panel-header">SUBSYSTEM ALLOCATION</div>
                <!-- Generated by JS -->
            </aside>
        </main>

        <footer class="hud-footer">
            <div class="decor-line"></div>
            <div class="footer-text">SECURE CONNECTION ESTABLISHED // ENCRYPTION LEVEL 9</div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
